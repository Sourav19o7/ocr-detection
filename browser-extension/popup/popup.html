<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hallmark QC Uploader</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="popup">
    <!-- Header -->
    <header class="header">
      <div class="logo">
        <span class="logo-icon">HQC</span>
        <span class="logo-text">Portal Uploader</span>
      </div>
      <button class="settings-btn" id="settingsBtn" title="Settings">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="3"></circle>
          <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
        </svg>
      </button>
    </header>

    <!-- Session Status -->
    <div class="session-status" id="sessionStatus">
      <span class="status-dot" id="statusDot"></span>
      <span class="status-text" id="statusText">Checking...</span>
    </div>

    <!-- Main Content -->
    <main class="main" id="mainContent">
      <!-- Queue Stats -->
      <div class="stats-grid">
        <div class="stat-card">
          <div class="stat-value" id="statPending">0</div>
          <div class="stat-label">Pending</div>
        </div>
        <div class="stat-card uploading">
          <div class="stat-value" id="statUploading">0</div>
          <div class="stat-label">Uploading</div>
        </div>
        <div class="stat-card success">
          <div class="stat-value" id="statCompleted">0</div>
          <div class="stat-label">Completed</div>
        </div>
        <div class="stat-card error">
          <div class="stat-value" id="statFailed">0</div>
          <div class="stat-label">Failed</div>
        </div>
      </div>

      <!-- Current Item -->
      <div class="current-item" id="currentItem" style="display: none;">
        <div class="current-label">Currently Processing</div>
        <div class="current-tag" id="currentTag">-</div>
        <div class="progress-bar">
          <div class="progress-fill" id="progressFill"></div>
        </div>
      </div>

      <!-- Action Buttons -->
      <div class="actions">
        <button class="btn btn-primary" id="startBtn" disabled>
          <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
            <polygon points="5 3 19 12 5 21 5 3"></polygon>
          </svg>
          Start Upload
        </button>
        <button class="btn btn-secondary" id="pauseBtn" style="display: none;">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
            <rect x="6" y="4" width="4" height="16"></rect>
            <rect x="14" y="4" width="4" height="16"></rect>
          </svg>
          Pause
        </button>
        <button class="btn btn-secondary" id="refreshBtn">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="23 4 23 10 17 10"></polyline>
            <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"></path>
          </svg>
          Refresh Queue
        </button>
      </div>

      <!-- Error Message -->
      <div class="error-message" id="errorMessage" style="display: none;">
        <span class="error-icon">!</span>
        <span class="error-text" id="errorText"></span>
      </div>

      <!-- Queue Preview -->
      <div class="queue-preview" id="queuePreview">
        <div class="queue-header">
          <span>Upload Queue</span>
          <span class="queue-count" id="queueCount">0 items</span>
        </div>
        <div class="queue-list" id="queueList">
          <div class="queue-empty">No items in queue</div>
        </div>
      </div>
    </main>

    <!-- Settings Panel -->
    <div class="settings-panel" id="settingsPanel" style="display: none;">
      <h3>Settings</h3>
      <div class="form-group">
        <label for="apiUrl">API Base URL</label>
        <input type="text" id="apiUrl" placeholder="http://localhost:8000">
      </div>
      <div class="form-group">
        <label for="apiKey">API Key</label>
        <input type="password" id="apiKey" placeholder="Enter API key">
      </div>
      <div class="form-actions">
        <button class="btn btn-secondary" id="cancelSettings">Cancel</button>
        <button class="btn btn-primary" id="saveSettings">Save</button>
      </div>
    </div>

    <!-- Footer -->
    <footer class="footer">
      <span>v1.0.0</span>
      <a href="#" id="helpLink">Help</a>
    </footer>
  </div>

  <script src="popup.js"></script>
</body>
</html>
