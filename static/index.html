<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BAC DATA COLLECTION</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container">
    <!-- Login Section -->
    <div id="login-section" class="section">
      <div class="logo-container">
        <img src="/bac-logo.png" alt="BAC Logo" class="bac-logo">
      </div>
      <h1>BAC DATA COLLECTION</h1>
      <form id="login-form" class="login-form">
        <div class="form-group">
          <label for="username">Username</label>
          <input type="text" id="username" name="username" required autocomplete="username">
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" required autocomplete="current-password">
        </div>
        <button type="submit" class="btn btn-primary">Login</button>
        <p id="login-error" class="error-message"></p>
      </form>
    </div>

    <!-- Upload Section -->
    <div id="upload-section" class="section hidden">
      <div class="logo-container">
        <img src="/bac-logo.png" alt="BAC Logo" class="bac-logo">
      </div>
      <div class="header">
        <h1>BAC DATA COLLECTION</h1>
        <button id="logout-btn" class="btn btn-secondary">Logout</button>
      </div>

      <div class="upload-area" id="drop-zone">
        <div class="upload-icon">
          <svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
            <polyline points="17 8 12 3 7 8"></polyline>
            <line x1="12" y1="3" x2="12" y2="15"></line>
          </svg>
        </div>
        <p class="upload-text">Drag and drop files here</p>
        <p class="upload-subtext">or</p>
        <label for="file-input" class="btn btn-primary">Browse Files</label>
        <input type="file" id="file-input" multiple hidden>
        <p class="supported-formats">Supports all file types: CSV, Images, PDFs, Documents, and more</p>
      </div>

      <div id="file-list" class="file-list"></div>

      <button id="upload-btn" class="btn btn-primary btn-upload hidden">Upload Files</button>

      <div id="upload-progress" class="progress-container hidden">
        <div class="progress-bar">
          <div class="progress-fill" id="progress-fill"></div>
        </div>
        <p id="progress-text" class="progress-text">Uploading...</p>
      </div>

      <div id="upload-results" class="upload-results hidden"></div>
    </div>
  </div>

  <!-- Footer -->
  <footer class="footer">
    <p class="security-text">Your data is secure and encrypted during transfer</p>
    <div class="powered-by">
      <span>Powered by</span>
      <img src="/logo.png" alt="Rezinix" class="rezinix-logo">
    </div>
  </footer>

  <script src="app.js"></script>
</body>
</html>
